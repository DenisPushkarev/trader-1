name: reviewer-agent

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      pr_number:
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write
  issues: read

jobs:
  review:
    runs-on: [self-hosted, linux, agent, reviewer]
    timeout-minutes: 45
    env:
      PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: pip3 install --quiet --break-system-packages pyyaml requests

      - name: Show active model
        run: |
          MODEL=$(python3 -c "import yaml; print(yaml.safe_load(open('.github/agent-config.yml'))['models']['reviewer'])")
          echo "Reviewer model: $MODEL"

      - name: Collect PR diff
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          mkdir -p .github/tmp
          gh pr diff "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" > .github/tmp/pr-diff.patch
          echo "Diff size: $(wc -l < .github/tmp/pr-diff.patch) lines"

      - name: Find related implementation plan
        run: |
          # Try to extract issue number from PR body
          ISSUE_NUM=$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json body -q '.body' \
            | grep -oP 'Closes #\K\d+' | head -1 || echo "")
          if [[ -n "$ISSUE_NUM" ]] && [[ -f "docs/ai/plans/ISSUE-${ISSUE_NUM}.md" ]]; then
            echo "PLAN_PATH=docs/ai/plans/ISSUE-${ISSUE_NUM}.md" >> "$GITHUB_ENV"
            echo "Found plan for issue #${ISSUE_NUM}"
          else
            echo "PLAN_PATH=" >> "$GITHUB_ENV"
            echo "No implementation plan found"
          fi
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Build reviewer prompt
        run: |
          {
            echo "# Review Request"
            echo ""
            echo "## Platform Context"
            cat .github/agent-contexts/platform-global.md
            echo ""
            echo "## Reviewer Context"
            cat .github/agent-contexts/reviewer-context.md
            echo ""
            if [[ -n "$PLAN_PATH" ]] && [[ -f "$PLAN_PATH" ]]; then
              echo "## Implementation Plan"
              cat "$PLAN_PATH"
              echo ""
            fi
            echo "## PR Diff"
            echo '```diff'
            cat .github/tmp/pr-diff.patch
            echo '```'
            echo ""
            echo "## Instructions"
            echo "Review the diff above. Produce structured findings following the review template."
            echo "For each finding include: severity, category, file, problem, rationale, recommendation."
            echo "Categories: correctness | architecture | contracts | reliability | security | testing"
            echo "Severities: critical | high | medium | low"
            echo "End with a decision: approve | request-changes | escalate-human"
          } > .github/tmp/reviewer-prompt.md

      - name: Run reviewer LLM
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          python3 .github/scripts/call-llm.py \
            --role reviewer \
            --system .github/agent-contexts/reviewer-context.md \
            --prompt .github/tmp/reviewer-prompt.md \
            > .github/tmp/review-findings.md
          echo "--- Review preview ---"
          head -30 .github/tmp/review-findings.md

      - name: Publish review to PR
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          REVIEW_BODY=$(cat .github/tmp/review-findings.md)
          gh pr comment "$PR_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --body "$(printf '## 🔍 AI Review\n\n%s\n\n---\n*Generated by reviewer-agent*' "$REVIEW_BODY")"
