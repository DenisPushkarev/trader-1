name: architect-agent

on:
  workflow_dispatch:
    inputs:
      issue_number:
        required: true
        type: string
      task_packet_json:
        required: true
        type: string
  workflow_call:
    inputs:
      issue_number:
        required: true
        type: string
      task_packet_json:
        required: true
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  architect:
    runs-on: [self-hosted, linux, agent, architect]
    timeout-minutes: 30
    env:
      TASK_PACKET: /tmp/task-packet-${{ inputs.issue_number }}.json
      TASK_PACKET_JSON: ${{ inputs.task_packet_json }}
      ISSUE_NUMBER: ${{ inputs.issue_number }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Write task packet
        run: echo "$TASK_PACKET_JSON" > "$TASK_PACKET"

      - name: Install dependencies
        run: pip3 install --quiet --break-system-packages pyyaml requests

      - name: Show active model
        run: |
          MODEL=$(python3 -c "import yaml; print(yaml.safe_load(open('.github/agent-config.yml'))['models']['architect'])")
          echo "Architect model: $MODEL"

      - name: Validate task packet
        run: |
          python3 -c "
          import json, sys, os
          p = os.environ['TASK_PACKET']
          if not os.path.exists(p):
              print('ERROR: task packet not found: ' + p)
              sys.exit(1)
          t = json.load(open(p))
          print('Task: ' + str(t.get('task_id','?')) + ' — ' + str(t.get('objective','?')))
          print('Area: ' + str(t.get('area','?')))
          "

      - name: Build prompt and generate implementation plan
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          mkdir -p docs/ai/plans
          python3 .github/scripts/build-architect-prompt.py \
            --task-packet "$TASK_PACKET" \
          | python3 .github/scripts/call-llm.py \
              --role architect \
              --prompt - \
            > "docs/ai/plans/ISSUE-${ISSUE_NUMBER}.md"
          echo "--- Plan preview ---"
          head -30 "docs/ai/plans/ISSUE-${ISSUE_NUMBER}.md"

      - name: Commit plan to repository
        run: |
          git config user.name  "architect-agent"
          git config user.email "architect-agent@github-actions"
          PLAN="docs/ai/plans/ISSUE-${ISSUE_NUMBER}.md"
          TMPPLAN=$(mktemp)
          cp "$PLAN" "$TMPPLAN"
          git rebase --abort 2>/dev/null || true
          git merge --abort  2>/dev/null || true
          git reset --hard HEAD
          git clean -fd -- docs/
          git pull --rebase origin main
          mkdir -p docs/ai/plans
          cp "$TMPPLAN" "$PLAN"
          git add "$PLAN"
          git diff --cached --quiet || git commit -m "docs: implementation plan for ISSUE-${ISSUE_NUMBER} [skip ci]"
          git push origin main

      - name: Publish plan to issue
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          PLAN_PATH="docs/ai/plans/ISSUE-${ISSUE_NUMBER}.md"
          PLAN_BODY=$(cat "$PLAN_PATH")

          gh issue comment "$ISSUE_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --body "$(printf '## 🏗️ Implementation Plan\n\n%s\n\n---\n*Generated by architect-agent*' "$PLAN_BODY")"

          gh issue edit "$ISSUE_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --add-label "agent/planned"

          REQUIRES_APPROVAL=$(python3 -c "import json,os; t=json.load(open(os.environ['TASK_PACKET'])); print('true' if t.get('requires_manual_plan_approval',True) else 'false')")
          if [[ "$REQUIRES_APPROVAL" == "false" ]]; then
            echo "Auto-approving: adding agent/build-ready and triggering developer-agent"
            gh issue edit "$ISSUE_NUMBER" \
              --repo "$GITHUB_REPOSITORY" \
              --add-label "agent/build-ready"
            gh workflow run developer-agent.yml \
              --repo "$GITHUB_REPOSITORY" \
              --ref main \
              -f "issue_number=${ISSUE_NUMBER}" \
              -f "task_packet_json=${TASK_PACKET_JSON}" \
              -f "plan_path=docs/ai/plans/ISSUE-${ISSUE_NUMBER}.md"
            echo "developer-agent.yml triggered"
          else
            echo "Manual approval required — NOT adding agent/build-ready"
            gh issue comment "$ISSUE_NUMBER" \
              --repo "$GITHUB_REPOSITORY" \
              --body "⚠️ **Manual approval required.** Review the plan above and add label \`agent/build-ready\` to start implementation."
          fi
