name: reviewer-agent

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      pr_number:
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write
  issues: read

jobs:
  review:
    runs-on: [self-hosted, linux, agent, reviewer]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Load review context
        run: |
          cat .github/agent-contexts/platform-global.md
          cat .github/agent-contexts/reviewer-context.md

      - name: Show active model
        run: |
          MODEL=$(python3 -c "import yaml; print(yaml.safe_load(open('.github/agent-config.yml'))['models']['reviewer'])")
          echo "Reviewer model: $MODEL"

      - name: Collect diff and related plan
