name: architect-agent

on:
  workflow_dispatch:
    inputs:
      issue_number:
        required: true
        type: string
      task_packet_path:
        required: true
        type: string
  workflow_call:
    inputs:
      issue_number:
        required: true
        type: string
      task_packet_path:
        required: true
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  architect:
    runs-on: [self-hosted, linux, agent, architect]
    timeout-minutes: 30
    env:
      TASK_PACKET: ${{ inputs.task_packet_path }}
      ISSUE_NUMBER: ${{ inputs.issue_number }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Install dependencies
        run: pip3 install --quiet --break-system-packages pyyaml requests

      - name: Show active model
        run: |
          MODEL=$(python3 -c "import yaml; print(yaml.safe_load(open('.github/agent-config.yml'))['models']['architect'])")
          echo "Architect model: $MODEL"

      - name: Validate task packet
        run: |
          python3 -c "import json,sys,os; p=os.environ['TASK_PACKET']; (print('ERROR: task packet not found: '+p) or sys.exit(1)) if not os.path.exists(p) else None; t=json.load(open(p)); print('Task: '+str(t.get('task_id','?'))+' — '+str(t.get('objective','?'))); print('Area: '+str(t.get('area','?')))"

      - name: Build architect prompt
        run: |
          mkdir -p .github/tmp docs/ai/plans
          python3 .github/scripts/build-architect-prompt.py \
            --task-packet "$TASK_PACKET" \
            > .github/tmp/architect-prompt.md
          echo "--- Prompt size: $(wc -c < .github/tmp/architect-prompt.md) bytes ---"
          head -20 .github/tmp/architect-prompt.md

      - name: Generate implementation plan
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          python3 .github/scripts/call-llm.py \
            --role architect \
            --prompt .github/tmp/architect-prompt.md \
            > "docs/ai/plans/ISSUE-${ISSUE_NUMBER}.md"
          echo "--- Plan preview ---"
          head -30 "docs/ai/plans/ISSUE-${ISSUE_NUMBER}.md"

      - name: Commit plan to repository
        run: |
          git config user.name  "architect-agent"
          git config user.email "architect-agent@github-actions"
          git pull --rebase origin main
          git add "docs/ai/plans/ISSUE-${ISSUE_NUMBER}.md"
          git diff --cached --quiet || git commit -m "docs: implementation plan for ISSUE-${ISSUE_NUMBER} [skip ci]"
          git push origin main

      - name: Publish plan to issue
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          PLAN_PATH="docs/ai/plans/ISSUE-${ISSUE_NUMBER}.md"
          PLAN_BODY=$(cat "$PLAN_PATH")

          gh issue comment "$ISSUE_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --body "$(printf '## 🏗️ Implementation Plan\n\n%s\n\n---\n*Generated by architect-agent*' "$PLAN_BODY")"

          gh issue edit "$ISSUE_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --add-label "agent/planned"

          # Check if manual approval is required
          REQUIRES_APPROVAL=$(python3 -c "import json,os; t=json.load(open(os.environ['TASK_PACKET'])); print('true' if t.get('route',{}).get('requires_manual_plan_approval',True) else 'false')")
          if [[ "$REQUIRES_APPROVAL" == "false" ]]; then
            echo "Auto-approving: adding agent/build-ready"
            gh issue edit "$ISSUE_NUMBER" \
              --repo "$GITHUB_REPOSITORY" \
              --add-label "agent/build-ready"
          else
            echo "Manual approval required — NOT adding agent/build-ready"
            gh issue comment "$ISSUE_NUMBER" \
              --repo "$GITHUB_REPOSITORY" \
              --body "⚠️ **Manual approval required.** Review the plan above and add label \`agent/build-ready\` to start implementation."
          fi
