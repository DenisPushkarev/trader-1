name: agent-router

on:
  issues:
    types: [opened, labeled, edited]
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: write
  actions: write    # needed to trigger architect-agent.yml

jobs:
  route:
    # Fire only on: /plan comment  OR  manual agent/build-ready label
    if: |
      (github.event_name == 'issue_comment' &&
       contains(github.event.comment.body, '/plan') &&
       github.event.comment.user.type != 'Bot') ||
      (github.event_name == 'issues' &&
       github.event.action == 'labeled' &&
       github.event.label.name == 'agent/build-ready')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip3 install --quiet --break-system-packages pyyaml

      - name: Route issue and trigger architect
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          COMMENT_BODY="${{ github.event.comment.body }}"
          LABEL_NAME="${{ github.event.label.name }}"

          python3 .github/scripts/route.py \
            --issue-number "$ISSUE_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --trigger-comment "$COMMENT_BODY" \
            --trigger-label "$LABEL_NAME"
