name: agent-router

on:
  issues:
    types: [opened, labeled, edited]
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: write
  actions: write    # needed to trigger architect-agent.yml

jobs:
  route:
    # Skip bot comments; only run on /plan comment or issue events
    if: |
      github.event_name == 'issues' ||
      (github.event_name == 'issue_comment' &&
       contains(github.event.comment.body, '/plan') &&
       github.event.comment.user.type != 'Bot')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip3 install --quiet --break-system-packages pyyaml

      - name: Route issue and trigger architect
        env:
          # Override GITHUB_TOKEN so gh CLI uses the PAT (which has workflow scope)
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          COMMENT_BODY="${{ github.event.comment.body }}"

          python3 .github/scripts/route.py \
            --issue-number "$ISSUE_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --trigger-comment "$COMMENT_BODY"
